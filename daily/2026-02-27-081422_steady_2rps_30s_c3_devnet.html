<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TACo Performance Report</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
:root { --bg: #000000; --card-bg: #111111; --text: #ffffff; --text-muted: #909090; --accent: #96FF5E; --success: #96FF5E; --warning: #ffa726; --error: #ef5350; --border: #333333; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace; background: var(--bg); color: var(--text); line-height: 1.6; padding: 2rem; }
.container { max-width: 1400px; margin: 0 auto; }
.header { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem; }
h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.05em; }
h2 { font-size: 1.25rem; margin: 2rem 0 1rem; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
h3 { font-size: 1rem; margin: 0 0 0.75rem; }
.timestamp { color: var(--text-muted); font-size: 0.85rem; }
.config-label { color: var(--text-muted); font-size: 0.8rem; margin-bottom: 2rem; }
.overall-badge { display: inline-block; padding: 0.25rem 1rem; border-radius: 3px; font-weight: bold; font-size: 1.5rem; }
.cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
.result-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 4px; padding: 1.25rem; }
.result-card h3 { color: var(--accent); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem; }
.stat-row { display: flex; justify-content: space-between; padding: 0.3rem 0; border-bottom: 1px solid var(--border); }
.stat-row:last-child { border-bottom: none; }
.stat-label { color: var(--text-muted); font-size: 0.85rem; }
.stat-value { font-weight: 600; font-size: 0.85rem; }
.chart-container { background: var(--card-bg); border: 1px solid var(--border); border-radius: 4px; padding: 1rem; margin-bottom: 1.5rem; }
.chart-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 1.5rem; }
@media (max-width: 1100px) { .chart-row { grid-template-columns: 1fr; } }
.error-section { background: var(--card-bg); border: 1px solid var(--border); border-radius: 4px; padding: 1.25rem; margin-bottom: 1rem; }
.error-section h3 { color: var(--text-muted); font-size: 0.85rem; }
.error-type { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
.error-type:last-child { border-bottom: none; }
.error-count { background: var(--error); color: white; padding: 0.15rem 0.5rem; border-radius: 2px; font-size: 0.8rem; font-weight: bold; }
</style>
</head>
<body>
<div class="container">
<div class="header"><h1>TACo Performance Report</h1><span class="overall-badge" style="color:#96FF5E">100.0%</span></div>
<div class="timestamp">Fri, Feb 27, 2026, 08:13 AM UTC</div>
<div class="config-label">devnet | Cohort 3 | Chain 84532</div>
<div class="cards-grid"><div class="result-card"><h3>steady @ 2 req/s</h3><div class="stat-row"><span class="stat-label">Requests</span><span class="stat-value">60 / 60</span></div><div class="stat-row"><span class="stat-label">Success Rate</span><span class="stat-value" style="color:#96FF5E">100.0%</span></div><div class="stat-row"><span class="stat-label">Duration</span><span class="stat-value">30.6s</span></div><div class="stat-row"><span class="stat-label">p50</span><span class="stat-value">1.63s</span></div><div class="stat-row"><span class="stat-label">p95</span><span class="stat-value">3.95s</span></div><div class="stat-row"><span class="stat-label">p99</span><span class="stat-value">4.84s</span></div><div class="stat-row"><span class="stat-label">TACo p50</span><span class="stat-value">1.62s</span></div><div class="stat-row"><span class="stat-label">TACo p95</span><span class="stat-value">3.95s</span></div></div></div>
<h2>Request Timeline</h2><div class="chart-container"><div id="timelineChart" style="height:400px"></div></div>
<div class="chart-row"><div class="chart-container"><div id="latencyHistChart" style="height:350px"></div></div><div class="chart-container"><div id="inFlightChart" style="height:350px"></div></div></div>
<div class="chart-container"><div id="inFlightVsLatencyChart" style="height:350px"></div></div>
</div>
<script>

  var el = document.getElementById(id);
  var icon = document.getElementById('icon-' + id);
  if (el.style.display === 'none') { el.style.display = 'block'; icon.textContent = '-'; }
  else { el.style.display = 'none'; icon.textContent = '+'; }
}

608,1.615,2.465,2.454,2.412,2.057,1.618,2.371,2.984,1.611,1.583,1.597,1.588,1.638,1.569,1.629,1.6,1.588,1.584,1.623,1.581,1.634,1.599,1.6,1.583,1.607],"fail":[]},"inFlightVsLatency":{"x":[8,8,7,6,6,5,5,8,7,6,5,8,7,6,5,4,5,4,4,4,4,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,4,4,4,4,5,4,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,2,1,0],"y":[3.954,3.792,4.84,2.966,3.819,2.942,2.904,4.412,3.916,2.917,3.418,3.118,4.134,3.662,2.663,2.484,2.516,2.42,2.481,2.456,1.623,2.429,1.622,1.587,1.59,1.597,1.58,1.58,1.639,1.584,1.589,1.613,1.58,1.595,1.608,1.615,2.465,2.454,2.412,2.057,1.618,2.371,2.984,1.611,1.583,1.597,1.588,1.638,1.569,1.629,1.6,1.588,1.584,1.623,1.581,1.634,1.599,1.6,1.583,1.607],"success":[true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true]}};
const plotlyLayout = {
  paper_bgcolor: '#000000', plot_bgcolor: '#111111',
  font: { family: 'SF Mono, Monaco, Inconsolata, monospace', color: '#ffffff', size: 11 },
  xaxis: { gridcolor: '#222222', zerolinecolor: '#222222' },
  yaxis: { gridcolor: '#222222', zerolinecolor: '#222222' },
  margin: { l: 60, r: 30, t: 40, b: 50 }, hovermode: 'closest'
};
const plotlyConfig = { responsive: true, displayModeBar: true, modeBarButtonsToRemove: ['lasso2d', 'select2d'], displaylogo: false };
if (chartData.timeline) {
  var tl = chartData.timeline;
  Plotly.newPlot('timelineChart', [
    { x: tl.success.x, y: tl.success.y, text: tl.success.text, mode: 'markers', type: 'scatter', name: 'Success',
      marker: { color: '#96FF5E', size: 6, opacity: 0.7 }, hovertemplate: '%{text}<br>%{y:.2f}s<extra>Success</extra>' },
    { x: tl.fail.x, y: tl.fail.y, text: tl.fail.text, mode: 'markers', type: 'scatter', name: 'Failed',
      marker: { color: '#ef5350', size: 8, symbol: 'x', opacity: 0.9 }, hovertemplate: '%{text}<br>%{y:.2f}s<extra>Failed</extra>' }
  ], { ...plotlyLayout, title: 'Request Latency Over Time',
    xaxis: { ...plotlyLayout.xaxis, title: 'Elapsed Time (s)' },
    yaxis: { ...plotlyLayout.yaxis, title: 'Latency (s)' } }, plotlyConfig);
}
if (chartData.latencyHist) {
  var h = chartData.latencyHist;
  Plotly.newPlot('latencyHistChart', [
    { x: h.success, type: 'histogram', name: 'Success', marker: { color: '#96FF5E' }, opacity: 0.7 },
    { x: h.fail, type: 'histogram', name: 'Failed', marker: { color: '#ef5350' }, opacity: 0.7 }
  ], { ...plotlyLayout, title: 'Latency Distribution', barmode: 'overlay',
    xaxis: { ...plotlyLayout.xaxis, title: 'Latency (s)' },
    yaxis: { ...plotlyLayout.yaxis, title: 'Count' } }, plotlyConfig);
}
if (chartData.timelineInFlight) {
  var inf = chartData.timelineInFlight;
  Plotly.newPlot('inFlightChart', [
    { x: inf.x, y: inf.y, type: 'scatter', mode: 'lines', name: 'In-flight',
      line: { color: '#ffa726', width: 1.5 }, fill: 'tozeroy', fillcolor: 'rgba(255,167,38,0.15)' }
  ], { ...plotlyLayout, title: 'Concurrent In-flight Requests',
    xaxis: { ...plotlyLayout.xaxis, title: 'Elapsed Time (s)' },
    yaxis: { ...plotlyLayout.yaxis, title: 'In-flight' } }, plotlyConfig);
}
if (chartData.inFlightVsLatency) {
  var iv = chartData.inFlightVsLatency;
  var ivColors = iv.success.map(function(ok) { return ok ? '#96FF5E' : '#ef5350'; });
  Plotly.newPlot('inFlightVsLatencyChart', [
    { x: iv.x, y: iv.y, mode: 'markers', type: 'scatter',
      marker: { color: ivColors, size: 5, opacity: 0.6 },
      hovertemplate: 'In-flight: %{x}<br>Latency: %{y:.2f}s<extra></extra>' }
  ], { ...plotlyLayout, title: 'In-flight vs Latency',
    xaxis: { ...plotlyLayout.xaxis, title: 'Concurrent In-flight' },
    yaxis: { ...plotlyLayout.yaxis, title: 'Latency (s)' } }, plotlyConfig);
}
if (chartData.steadySweep) {
  var sw = chartData.steadySweep;
  Plotly.newPlot('sweepSuccessChart', [
    { x: sw.map(function(d){return d.label}), y: sw.map(function(d){return d.successPct}),
      type: 'scatter', mode: 'lines+markers', name: 'Success Rate',
      line: { color: '#96FF5E', width: 3 },
      marker: { size: 10, color: sw.map(function(d){ return d.successPct >= 95 ? '#96FF5E' : d.successPct >= 80 ? '#ffa726' : '#ef5350'; }),
        line: { color: '#000000', width: 2 } },
      hovertemplate: '%{x}<br>%{y:.1f}%<extra></extra>' }
  ], { ...plotlyLayout, title: 'Success Rate vs Request Rate',
    xaxis: { ...plotlyLayout.xaxis, title: 'Request Rate' },
    yaxis: { ...plotlyLayout.yaxis, title: 'Success Rate (%)', range: [0, 105] } }, plotlyConfig);
}
if (chartData.steadySweep) {
  var sw2 = chartData.steadySweep;
  Plotly.newPlot('sweepLatencyChart', [
    { x: sw2.map(function(d){return d.label}), y: sw2.map(function(d){return d.p50}),
      type: 'scatter', mode: 'lines+markers', name: 'p50', line: { color: '#96FF5E', width: 3 }, marker: { size: 8 } },
    { x: sw2.map(function(d){return d.label}), y: sw2.map(function(d){return d.p95}),
      type: 'scatter', mode: 'lines+markers', name: 'p95', line: { color: '#ffa726', width: 2, dash: 'dash' }, marker: { size: 6 } },
    { x: sw2.map(function(d){return d.label}), y: sw2.map(function(d){return d.p99}),
      type: 'scatter', mode: 'lines+markers', name: 'p99', line: { color: '#ef5350', width: 1, dash: 'dot' }, marker: { size: 5 } }
  ], { ...plotlyLayout, title: 'Latency Percentiles vs Request Rate',
    xaxis: { ...plotlyLayout.xaxis, title: 'Request Rate' },
    yaxis: { ...plotlyLayout.yaxis, title: 'Latency (s)' } }, plotlyConfig);
}
if (chartData.nodeFailures) {
  var nf = chartData.nodeFailures;
  Plotly.newPlot('nodeFailureChart', [
    { x: nf.labels, y: nf.timeouts, type: 'bar', name: 'Timeouts', marker: { color: '#ffa726' },
      text: nf.fullLabels, hovertemplate: '%{text}<br>Timeouts: %{y}<extra></extra>' },
    { x: nf.labels, y: nf.otherErrors, type: 'bar', name: 'Other Errors', marker: { color: '#ef5350' },
      text: nf.fullLabels, hovertemplate: '%{text}<br>Errors: %{y}<extra></extra>' }
  ], { ...plotlyLayout, title: 'Per-Node Error Attribution', barmode: 'stack',
    xaxis: { ...plotlyLayout.xaxis, title: 'Node' },
    yaxis: { ...plotlyLayout.yaxis, title: 'Error Count' } }, plotlyConfig);
}
</script>
